# ──────────────────────────────────────────────────────────────
# Hoppscotch Nginx Reverse Proxy
# Server: api.paysyslabs.com / REDACTED_SERVER_IP
# Port:   8090 (host) → 80 (container)
# ──────────────────────────────────────────────────────────────

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Use Docker's embedded DNS so upstream IPs are re-resolved after container restarts
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name REDACTED_SERVER_IP api.paysyslabs.com _;

    client_max_body_size 50M;
    proxy_read_timeout   86400s;
    proxy_send_timeout   86400s;
    keepalive_timeout    65;

    # ── Proxy headers ─────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    # ── Cookie rewriting ──────────────────────────────────────
    # Problem: backend sets refresh_token with Path=/v1/auth/refresh
    # but browser requests GET /api/auth/refresh — paths don't match
    # so the cookie is never sent → 403 on every refresh → logout.
    #
    # Fix: rewrite cookie Path before the browser stores it.
    # More specific rule must come first.
    proxy_cookie_path /v1/auth/refresh /api/auth/refresh;
    proxy_cookie_path /v1/             /;

    # Rewrite internal Docker hostname in Domain attribute (if present)
    proxy_cookie_domain hoppscotch-backend $host;

    # ── GitHub OAuth — intercepted before /api/ catch-all ───────
    # smtp-bridge does the full code exchange + email pick + signin.
    # This bypasses passport-github2 which fails when no primary email.
    location = /api/auth/github {
        proxy_pass http://smtp-bridge:8026/github-start;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/auth/github/callback {
        proxy_pass http://smtp-bridge:8026/github-callback;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── /accept-invite → smtp-bridge:8026 ────────────────────
    # Permanent fix for team_invite/email_do_not_match.
    # On every click: looks up inviteeEmail, triggers fresh signin,
    # redirects to /magic-login with correct auth → /join-team.
    location /accept-invite {
        proxy_pass http://smtp-bridge:8026;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── /magic-login → smtp-bridge:8026 ──────────────────────
    # Verifies token server-side, rewrites cookies, redirects browser.
    # Supports ?redirect=/path for post-auth destination.
    location /magic-login {
        proxy_pass http://smtp-bridge:8026;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── /forward → hopps-proxy:9159 (transform + forward) ───
    # Accepts full JSON { target_url, meta_data, body }
    # Transforms to CSV body + SHA256 signature, forwards to Spring
    # No pre-request scripts needed in Hoppscotch
    location /forward {
        proxy_pass         http://hopps-proxy:9159/forward;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # ── /proxy/ → hopps-proxy:9159 (server-side CORS bypass) ─
    # Hoppscotch proxy mode: browser POSTs request details here,
    # proxy fetches the actual target server-side → no CORS block.
    # Works for REST (JSON/XML/form), any method, any content type.
    # WebSocket connections are direct (no CORS restriction applies).
    location /proxy/ {
        proxy_pass         http://hopps-proxy:9159/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_buffering    off;
    }

    # ── /api/graphql → backend (WebSocket) ───────────────────
    location /api/graphql {
        rewrite ^/api/graphql(.*)$ /graphql$1 break;
        proxy_pass         http://hoppscotch-backend:8080;
        proxy_read_timeout 86400s;
        proxy_buffering    off;
    }

    # ── /api → backend (REST, versioned at /v1/) ─────────────
    location /api/ {
        rewrite ^/api/(.*)$ /v1/$1 break;
        proxy_pass http://hoppscotch-backend:8080;
    }

    location = /api {
        rewrite ^ /v1/ break;
        proxy_pass http://hoppscotch-backend:8080;
    }

    # ── /admin → hoppscotch-admin container ─────────────────
    location /admin {
        proxy_pass http://hoppscotch-admin:80;
    }

    # ── / → frontend ─────────────────────────────────────────
    location / {
        proxy_pass http://hoppscotch-frontend:80;
        proxy_intercept_errors on;
        error_page 404 = @frontend_fallback;
    }

    location @frontend_fallback {
        proxy_pass http://hoppscotch-frontend:80;
    }
}
