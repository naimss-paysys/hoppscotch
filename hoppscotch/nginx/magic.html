<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Signing in to Hoppscotch…</title>
<style>
  body { margin: 0; font-family: Arial, sans-serif; background: #f0f2f5;
         display: flex; align-items: center; justify-content: center; height: 100vh; }
  .box { text-align: center; color: #555; }
  .spinner { width: 36px; height: 36px; border: 3px solid #ddd;
             border-top-color: #3b5bdb; border-radius: 50%;
             animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p>Signing you in, please wait…</p>
</div>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var token  = params.get('token');
  var device = params.get('d');

  if (device && token) {
    // Inject deviceIdentifier into Hoppscotch's localStorage store.
    // The store key is the hostname:port + ".hoppscotch.store".
    // Hoppscotch kernel stores data as nested object under "persistence.v1".
    var storeKey = location.host + '.hoppscotch.store';
    try {
      var store = JSON.parse(localStorage.getItem(storeKey) || '{}');
      if (!store['persistence.v1']) store['persistence.v1'] = {};
      store['persistence.v1']['deviceIdentifier'] = device;
      localStorage.setItem(storeKey, JSON.stringify(store));
    } catch (e) { /* localStorage blocked — redirect anyway */ }
  }

  if (token) {
    location.replace('/enter?token=' + encodeURIComponent(token));
  } else {
    location.replace('/');
  }
})();
</script>
</body>
</html>
