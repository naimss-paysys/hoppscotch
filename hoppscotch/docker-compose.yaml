networks:
  hopps-net:
    driver: bridge
    name: hopps-net

volumes:
  hopps_postgres_data:
    name: hopps_postgres_data
  hopps_redis_data:
    name: hopps_redis_data

services:

  # ────────────────────────────────────────────
  # PostgreSQL for Hoppscotch
  # ────────────────────────────────────────────
  postgres-hopps:
    image: postgres:15-alpine
    container_name: hopps_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hoppscotch
      POSTGRES_PASSWORD: REDACTED_DB_PASS
      POSTGRES_DB: hoppscotch
    volumes:
      - hopps_postgres_data:/var/lib/postgresql/data
    networks:
      - hopps-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoppscotch -d hoppscotch"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m

  # ────────────────────────────────────────────
  # Redis
  # ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hopps_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass REDACTED_REDIS_PASS
      --appendonly yes
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
    volumes:
      - hopps_redis_data:/data
    networks:
      - hopps-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "REDACTED_REDIS_PASS", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256m

  # ────────────────────────────────────────────
  # SMTP Bridge — accepts SMTP from backend,
  # calls PaysysLabs HTTP email API
  # ────────────────────────────────────────────
  smtp-bridge:
    build: ../smtp-bridge
    image: hopps_smtp_bridge
    container_name: hopps_smtp_bridge
    restart: unless-stopped
    environment:
      EMAIL_API_URL: http://10.0.150.16:7034/api/EmailService
      FROM_NAME: paysyslabs
      FROM_EMAIL: watcher@paysyslabs.com
      PUBLIC_URL: http://api.paysyslabs.com:8090
      ADMIN_URL: http://api.paysyslabs.com:8091
      BACKEND_URL: http://hoppscotch-backend:8080
      GITHUB_CLIENT_ID: REDACTED_GITHUB_CLIENT_ID
      GITHUB_CLIENT_SECRET: REDACTED_GITHUB_SECRET
      GITHUB_CALLBACK_URL: http://api.paysyslabs.com:8090/api/auth/github/callback
    networks:
      - hopps-net
    deploy:
      resources:
        limits:
          memory: 64m

  # ────────────────────────────────────────────
  # Hoppscotch Proxy — server-side CORS proxy
  # /proxy/ → CORS bypass for Hoppscotch proxy mode
  # /forward → transform + sign + forward to Spring
  # ────────────────────────────────────────────
  hopps-proxy:
    build: ../hopps-proxy
    image: hopps_proxy
    container_name: hopps_proxy
    restart: unless-stopped
    extra_hosts:
      - "api.paysyslabs.com:REDACTED_SERVER_IP"
    networks:
      - hopps-net
    deploy:
      resources:
        limits:
          memory: 64m

  # ────────────────────────────────────────────
  # Hoppscotch Backend
  # Internal port: 8080 (NOT 3170)
  # ────────────────────────────────────────────
  hoppscotch-backend:
    image: hoppscotch/hoppscotch-backend:latest
    container_name: hopps_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://hoppscotch:REDACTED_DB_PASS@postgres-hopps:5432/hoppscotch
      REDIS_URL: redis://:REDACTED_REDIS_PASS@redis:6379
    depends_on:
      postgres-hopps:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hopps-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ping || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1g

  # ────────────────────────────────────────────
  # Hoppscotch Frontend
  # ────────────────────────────────────────────
  hoppscotch-frontend:
    image: hoppscotch/hoppscotch-frontend:latest
    container_name: hopps_frontend
    restart: unless-stopped
    environment:
      VITE_BASE_URL: http://api.paysyslabs.com:8090
      VITE_SHORTCODE_BASE_URL: http://api.paysyslabs.com:8090
      VITE_ADMIN_URL: http://api.paysyslabs.com:8091
      VITE_BACKEND_GQL_URL: http://api.paysyslabs.com:8090/api/graphql
      VITE_BACKEND_WS_URL: ws://api.paysyslabs.com:8090/api/graphql
      VITE_BACKEND_API_URL: http://api.paysyslabs.com:8090/api
      VITE_ALLOWED_AUTH_PROVIDERS: email,github
      VITE_PROXY_URL: http://api.paysyslabs.com:8090/proxy/
    depends_on:
      hoppscotch-backend:
        condition: service_healthy
    networks:
      - hopps-net
    deploy:
      resources:
        limits:
          memory: 256m

  # ────────────────────────────────────────────
  # Hoppscotch Admin
  # ────────────────────────────────────────────
  hoppscotch-admin:
    image: hoppscotch/hoppscotch-admin:latest
    container_name: hopps_admin
    restart: unless-stopped
    ports:
      - "8091:80"
    environment:
      VITE_BASE_URL: http://api.paysyslabs.com:8090
      VITE_SHORTCODE_BASE_URL: http://api.paysyslabs.com:8090
      VITE_ADMIN_URL: http://api.paysyslabs.com:8091
      VITE_BACKEND_GQL_URL: http://api.paysyslabs.com:8090/api/graphql
      VITE_BACKEND_WS_URL: ws://api.paysyslabs.com:8090/api/graphql
      VITE_BACKEND_API_URL: http://api.paysyslabs.com:8090/api
      VITE_ALLOWED_AUTH_PROVIDERS: email,github
      VITE_PROXY_URL: http://api.paysyslabs.com:8090/proxy/
    depends_on:
      hoppscotch-backend:
        condition: service_healthy
    networks:
      - hopps-net
    deploy:
      resources:
        limits:
          memory: 256m

  # ────────────────────────────────────────────
  # Nginx Reverse Proxy
  # Routes all traffic on port 8090
  # ────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: hopps_nginx
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro,z
      - ./nginx/magic.html:/usr/share/nginx/html/magic.html:ro,z
    depends_on:
      hoppscotch-frontend:
        condition: service_started
      hoppscotch-admin:
        condition: service_started
      hoppscotch-backend:
        condition: service_healthy
    networks:
      - hopps-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128m
